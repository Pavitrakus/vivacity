<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — Vivacity</title>
  <script src="https://accounts.google.com/gsi/client" async></script>
  <meta property="og:title" content="Vivacity - Mathematical reasoning, made visible." />
  <meta property="og:description" content="Type a concept. Get a Manim animation. Built for researchers, not presentations." />
  <meta property="og:image" content="https://vivacity-five.vercel.app/assets/images/og-image.png" />
  <meta property="og:url" content="https://vivacity-five.vercel.app" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="stylesheet" href="style.css" />
  <link rel="preload" href="fonts/GeistPixel-Regular-VariableFont_ELSH.ttf" as="font" type="font/ttf" crossorigin />
  <style>
    body {
      display: flex;
      min-height: 100vh;
      background: var(--bg);
      margin: 0;
      font-family: var(--font-sans);
    }
    
    /* Left side: Visuals */
    .auth-visual {
      flex: 1;
      display: none;
      align-items: center;
      justify-content: center;
      background: var(--bg-1);
      position: relative;
      overflow: hidden;
      border-right: 1px solid var(--border);
    }
    @media(min-width: 900px) {
      .auth-visual { display: flex; }
    }

    .auth-bg-glow {
      position: absolute;
      top: 50%; left: 50%;
      width: 800px; height: 800px;
      background: radial-gradient(circle, rgba(0, 140, 255, 0.1) 0%, transparent 60%);
      transform: translate(-50%, -50%);
      z-index: 1; pointer-events: none;
    }

    .fake-svg-container {
      position: relative;
      z-index: 2;
      width: 80%;
      max-width: 500px;
      aspect-ratio: 16/9;
      background: rgba(0,0,0,0.5);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      padding: 32px;
    }

    .auth-svg { width: 100%; height: 100%; }

    /* Right side: Form */
    .auth-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 48px;
      max-width: 600px;
      margin: 0 auto;
    }

    .auth-header { margin-bottom: 40px; }
    .auth-logo {
      font-family: var(--font-pixel);
      font-size: 32px;
      color: var(--t-1);
      text-decoration: none;
    }
    .auth-title {
      font-size: 24px;
      font-weight: 500;
      color: var(--t-1);
      margin-top: 16px;
    }
    .auth-sub { color: var(--t-2); font-size: 14px; margin-top: 8px; }

    .prompt-carryover {
      background: rgba(0, 140, 255, 0.05);
      border: 1px solid rgba(0, 140, 255, 0.2);
      border-radius: var(--r-sm);
      padding: 16px;
      margin-bottom: 32px;
      display: none;
    }
    .prompt-label {
      display: block;
      color: #00c3ff;
      margin-bottom: 8px;
      font-size: 10px;
      font-family: var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .prompt-text { font-family: var(--font-mono); font-size: 12px; color: var(--t-1); line-height: 1.5; }

    /* Form Elements */
    .input-group { margin-bottom: 16px; }
    .input-group label { display: block; font-size: 12px; color: var(--t-2); margin-bottom: 8px; font-weight: 500; }
    .input-group input {
      width: 100%;
      background: var(--bg-1);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 12px 16px;
      color: var(--t-1);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-group input:focus { border-color: #00c3ff; }

    .submit-btn {
      width: 100%;
      background: var(--t-1);
      color: var(--bg);
      border: none;
      border-radius: var(--r-sm);
      padding: 14px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s;
    }
    .submit-btn:hover { opacity: 0.9; }

    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 24px 0;
      color: var(--t-3);
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--border);
    }
    .divider:not(:empty)::before { margin-right: 16px; }
    .divider:not(:empty)::after { margin-left: 16px; }


    .auth-switch {
      margin-top: 32px;
      text-align: center;
      font-size: 14px;
      color: var(--t-2);
    }
    .auth-switch a { color: #00c3ff; text-decoration: none; font-weight: 500; cursor: pointer; }
    .auth-switch a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <!-- Left Visual Column -->
  <div class="auth-visual">
    <div class="auth-bg-glow"></div>
    <div class="fake-svg-container">
      <svg class="auth-svg" viewBox="0 0 400 300">
        <!-- Abstract glowing matrix / vector space visual -->
        <defs>
          <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00c3ff" />
            <stop offset="100%" stop-color="#0055ff" />
          </linearGradient>
          <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge>
              <feMergeNode in="coloredBlur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
        </defs>
        <g opacity="0.3" stroke="var(--border)" stroke-width="1">
          <line x1="0" y1="150" x2="400" y2="150" />
          <line x1="200" y1="0" x2="200" y2="300" />
          <circle cx="200" cy="150" r="100" fill="none" />
          <circle cx="200" cy="150" r="50" fill="none" />
        </g>
        <path d="M 200 150 Q 250 50 350 100" fill="none" stroke="url(#neonGradient)" stroke-width="3" filter="url(#glow)"/>
        <path d="M 50 200 Q 150 250 200 150" fill="none" stroke="#fff" stroke-width="2" stroke-dasharray="4,4"/>
        <circle cx="350" cy="100" r="4" fill="#00c3ff" filter="url(#glow)"/>
        <text x="350" y="90" fill="#fff" font-size="12" font-family="monospace">v(t)</text>
      </svg>
    </div>
  </div>

  <!-- Right Form Column -->
  <div class="auth-panel">
    <div class="auth-header">
      <a href="index.html" class="auth-logo">Vivacity.</a>
      <h1 class="auth-title" id="formTitle">Create an account</h1>
      <p class="auth-sub" id="formSub">Start rendering your concepts in seconds.</p>
    </div>

    <!-- Carried over prompt -->
    <div class="prompt-carryover" id="promptCarryover">
      <span class="prompt-label">Your Prompt</span>
      <div class="prompt-text" id="promptText"></div>
    </div>

    <!-- Auth Form -->
    <form id="authForm" onsubmit="event.preventDefault();">
      <div class="input-group">
        <label for="email">Email or Phone Number</label>
        <input type="text" id="email" placeholder="name@company.com" required />
      </div>
      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="submit-btn" id="submitBtn">Sign Up</button>
    </form>

    <div class="divider">or</div>

    <div id="googleBtnContainer" style="display: flex; justify-content: center; width: 100%;"></div>

    <div class="auth-switch">
      <span id="switchText">Already have an account?</span> 
      <a id="switchBtn">Log in</a>
    </div>
  </div>

  <script>
    // Catch prompt param
    const urlParams = new URLSearchParams(window.location.search);
    let promptText = urlParams.get('prompt');
    if (promptText) {
      document.getElementById('promptCarryover').style.display = 'block';
      document.getElementById('promptText').textContent = `"${promptText}"`;
    }

    // Hardcoded preview credentials
    const PREVIEW_CREDS = { email: 'qwerty@paxus.in', password: 'sara:(' };

    // Add error message element dynamically
    const errMsg = document.createElement('div');
    errMsg.style.cssText = 'display:none; color:#ff4466; font-size:13px; margin-bottom:12px; padding:10px 14px; background:rgba(255,68,102,0.08); border:1px solid rgba(255,68,102,0.25); border-radius:8px;';
    errMsg.textContent = 'Invalid email or password. Please try again.';
    document.getElementById('authForm').insertBefore(errMsg, document.getElementById('submitBtn'));

    // Toggle Login / Signup State
    let isLogin = false;
    document.getElementById('switchBtn').addEventListener('click', () => {
      isLogin = !isLogin;
      document.getElementById('formTitle').textContent = isLogin ? "Welcome back" : "Create an account";
      document.getElementById('formSub').textContent = isLogin ? "Log in to continue rendering." : "Start rendering your concepts in seconds.";
      document.getElementById('submitBtn').textContent = isLogin ? "Log In" : "Sign Up";
      document.getElementById('switchText').textContent = isLogin ? "Don't have an account?" : "Already have an account?";
      document.getElementById('switchBtn').textContent = isLogin ? "Sign up" : "Log in";
      errMsg.style.display = 'none';
    });

    // Form Submit — check preview creds, then redirect to workspace
    document.getElementById('authForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('submitBtn');

      // Animate button
      btn.textContent = 'Signing in...';
      btn.style.opacity = '0.7';

      setTimeout(() => {
        if (email === PREVIEW_CREDS.email && password === PREVIEW_CREDS.password) {
          // Success: carry prompt to workspace if present
          const dest = promptText ? `workspace.html?prompt=${encodeURIComponent(promptText)}` : 'workspace.html';
          window.location.href = dest;
        } else {
          btn.textContent = isLogin ? 'Log In' : 'Sign Up';
          btn.style.opacity = '1';
          errMsg.style.display = 'block';
          document.getElementById('password').value = '';
        }
      }, 800);
    });

    // Google Sign In (Google Identity Services)
    function decodeJwtResponse(token) {
      let base64Url = token.split('.')[1];
      let base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
      let jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
          return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
      }).join(''));
      return JSON.parse(jsonPayload);
    }

    function handleCredentialResponse(response) {
      const payload = decodeJwtResponse(response.credential);
      // Store user info in sessionStorage for the workspace to use
      sessionStorage.setItem('googleUser', JSON.stringify({
        name: payload.name,
        email: payload.email,
        picture: payload.picture
      }));
      // Redirect to workspace
      const dest = promptText ? `workspace.html?prompt=${encodeURIComponent(promptText)}` : 'workspace.html';
      window.location.href = dest;
    }

    window.onload = function () {
      google.accounts.id.initialize({
        client_id: "558859594965-aq5ae9cf07rgg8vr99uk5qt46s4g4ugn.apps.googleusercontent.com",
        callback: handleCredentialResponse
      });
      google.accounts.id.renderButton(
        document.getElementById("googleBtnContainer"),
        { theme: "filled_black", size: "large", width: 340, shape: "rectangular" }
      );
      google.accounts.id.prompt(); 
    }
  </script>
</body>
</html>
