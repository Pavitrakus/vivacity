<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — Vivacity</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preload" href="fonts/GeistPixel-Regular-VariableFont_ELSH.ttf" as="font" type="font/ttf" crossorigin />
  <style>
    body {
      display: flex;
      min-height: 100vh;
      background: var(--bg);
      margin: 0;
      font-family: var(--font-sans);
    }
    
    /* Left side: Visuals */
    .auth-visual {
      flex: 1;
      display: none;
      align-items: center;
      justify-content: center;
      background: var(--bg-1);
      position: relative;
      overflow: hidden;
      border-right: 1px solid var(--border);
    }
    @media(min-width: 900px) {
      .auth-visual { display: flex; }
    }

    .auth-bg-glow {
      position: absolute;
      top: 50%; left: 50%;
      width: 800px; height: 800px;
      background: radial-gradient(circle, rgba(0, 140, 255, 0.1) 0%, transparent 60%);
      transform: translate(-50%, -50%);
      z-index: 1; pointer-events: none;
    }

    .fake-svg-container {
      position: relative;
      z-index: 2;
      width: 80%;
      max-width: 500px;
      aspect-ratio: 16/9;
      background: rgba(0,0,0,0.5);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      padding: 32px;
    }

    .auth-svg { width: 100%; height: 100%; }

    /* Right side: Form */
    .auth-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 48px;
      max-width: 600px;
      margin: 0 auto;
    }

    .auth-header { margin-bottom: 40px; }
    .auth-logo {
      font-family: var(--font-pixel);
      font-size: 32px;
      color: var(--t-1);
      text-decoration: none;
    }
    .auth-title {
      font-size: 24px;
      font-weight: 500;
      color: var(--t-1);
      margin-top: 16px;
    }
    .auth-sub { color: var(--t-2); font-size: 14px; margin-top: 8px; }

    .prompt-carryover {
      background: rgba(0, 140, 255, 0.05);
      border: 1px solid rgba(0, 140, 255, 0.2);
      border-radius: var(--r-sm);
      padding: 16px;
      margin-bottom: 32px;
      display: none;
    }
    .prompt-label {
      display: block;
      color: #00c3ff;
      margin-bottom: 8px;
      font-size: 10px;
      font-family: var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .prompt-text { font-family: var(--font-mono); font-size: 12px; color: var(--t-1); line-height: 1.5; }

    /* Form Elements */
    .input-group { margin-bottom: 16px; }
    .input-group label { display: block; font-size: 12px; color: var(--t-2); margin-bottom: 8px; font-weight: 500; }
    .input-group input {
      width: 100%;
      background: var(--bg-1);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 12px 16px;
      color: var(--t-1);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-group input:focus { border-color: #00c3ff; }

    .submit-btn {
      width: 100%;
      background: var(--t-1);
      color: var(--bg);
      border: none;
      border-radius: var(--r-sm);
      padding: 14px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s;
    }
    .submit-btn:hover { opacity: 0.9; }

    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 24px 0;
      color: var(--t-3);
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--border);
    }
    .divider:not(:empty)::before { margin-right: 16px; }
    .divider:not(:empty)::after { margin-left: 16px; }

    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      background: transparent;
      color: var(--t-1);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 12px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .google-btn:hover { background: rgba(255,255,255,0.05); }
    .google-icon { width: 18px; height: 18px; }

    .auth-switch {
      margin-top: 32px;
      text-align: center;
      font-size: 14px;
      color: var(--t-2);
    }
    .auth-switch a { color: #00c3ff; text-decoration: none; font-weight: 500; cursor: pointer; }
    .auth-switch a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <!-- Left Visual Column -->
  <div class="auth-visual">
    <div class="auth-bg-glow"></div>
    <div class="fake-svg-container">
      <svg class="auth-svg" viewBox="0 0 400 300">
        <!-- Abstract glowing matrix / vector space visual -->
        <defs>
          <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00c3ff" />
            <stop offset="100%" stop-color="#0055ff" />
          </linearGradient>
          <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge>
              <feMergeNode in="coloredBlur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
        </defs>
        <g opacity="0.3" stroke="var(--border)" stroke-width="1">
          <line x1="0" y1="150" x2="400" y2="150" />
          <line x1="200" y1="0" x2="200" y2="300" />
          <circle cx="200" cy="150" r="100" fill="none" />
          <circle cx="200" cy="150" r="50" fill="none" />
        </g>
        <path d="M 200 150 Q 250 50 350 100" fill="none" stroke="url(#neonGradient)" stroke-width="3" filter="url(#glow)"/>
        <path d="M 50 200 Q 150 250 200 150" fill="none" stroke="#fff" stroke-width="2" stroke-dasharray="4,4"/>
        <circle cx="350" cy="100" r="4" fill="#00c3ff" filter="url(#glow)"/>
        <text x="350" y="90" fill="#fff" font-size="12" font-family="monospace">v(t)</text>
      </svg>
    </div>
  </div>

  <!-- Right Form Column -->
  <div class="auth-panel">
    <div class="auth-header">
      <a href="index.html" class="auth-logo">Vivacity.</a>
      <h1 class="auth-title" id="formTitle">Create an account</h1>
      <p class="auth-sub" id="formSub">Start rendering your concepts in seconds.</p>
    </div>

    <!-- Carried over prompt -->
    <div class="prompt-carryover" id="promptCarryover">
      <span class="prompt-label">Your Prompt</span>
      <div class="prompt-text" id="promptText"></div>
    </div>

    <!-- Auth Form -->
    <form id="authForm" onsubmit="event.preventDefault();">
      <div class="input-group">
        <label for="email">Email or Phone Number</label>
        <input type="text" id="email" placeholder="name@company.com" required />
      </div>
      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="submit-btn" id="submitBtn">Sign Up</button>
    </form>

    <div class="divider">or</div>

    <button class="google-btn" id="googleSignInBtn">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>

    <div class="auth-switch">
      <span id="switchText">Already have an account?</span> 
      <a id="switchBtn">Log in</a>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    // Firebase Placeholder Config
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "your-project.firebaseapp.com",
      projectId: "your-project",
      storageBucket: "your-project.appspot.com",
      messagingSenderId: "123456789",
      appId: "1:123456789:web:abcdef"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // Catch prompt param
    const urlParams = new URLSearchParams(window.location.search);
    const prompt = urlParams.get('prompt');
    if (prompt) {
      document.getElementById('promptCarryover').style.display = 'block';
      document.getElementById('promptText').textContent = `"${prompt}"`;
    }

    // Toggle Login / Signup State
    let isLogin = false;
    document.getElementById('switchBtn').addEventListener('click', () => {
      isLogin = !isLogin;
      document.getElementById('formTitle').textContent = isLogin ? "Welcome back" : "Create an account";
      document.getElementById('formSub').textContent = isLogin ? "Log in to continue rendering." : "Start rendering your concepts in seconds.";
      document.getElementById('submitBtn').textContent = isLogin ? "Log In" : "Sign Up";
      document.getElementById('switchText').textContent = isLogin ? "Don't have an account?" : "Already have an account?";
      document.getElementById('switchBtn').textContent = isLogin ? "Sign up" : "Log in";
    });

    // Form Submit (Email/Phone)
    document.getElementById('authForm').addEventListener('submit', () => {
      alert('Email/Password logic would trigger Firebase Auth here.');
    });

    // Google Sign In
    document.getElementById('googleSignInBtn').addEventListener('click', () => {
      if (firebaseConfig.apiKey === "YOUR_API_KEY") {
        alert("Firebase Auth requires a valid configuration. Please update the firebaseConfig in signup.html.");
        return;
      }
      signInWithPopup(auth, provider)
        .then((result) => console.log("Logged in:", result.user))
        .catch((err) => alert(err.message));
    });
  </script>
</body>
</html>
