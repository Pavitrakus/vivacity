<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — Vivacity</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preload" href="fonts/GeistPixel-Regular-VariableFont_ELSH.ttf" as="font" type="font/ttf" crossorigin />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg);
      margin: 0;
    }
    
    .auth-container {
      background: var(--bg-1);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 48px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      position: relative;
      z-index: 2;
    }
    
    .auth-logo {
      font-family: var(--font-pixel);
      font-size: 42px;
      color: var(--t-1);
      text-decoration: none;
      display: inline-block;
      margin-bottom: 8px;
    }

    .auth-sub {
      font-family: var(--font-sans);
      color: var(--t-2);
      font-size: 14px;
      margin-bottom: 32px;
    }

    .prompt-carryover {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 16px;
      margin-bottom: 32px;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--t-2);
      text-align: left;
      display: none; /* Hidden by default unless URL param exists */
    }

    .prompt-label {
      display: block;
      color: var(--t-1);
      margin-bottom: 8px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      background: #fff;
      color: #000;
      border: none;
      border-radius: var(--r-md);
      padding: 12px 24px;
      font-family: var(--font-sans);
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .google-btn:hover { background: #f0f0f0; }
    
    .google-icon { width: 18px; height: 18px; }

    .auth-bg-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(0, 140, 255, 0.15) 0%, transparent 70%);
      transform: translate(-50%, -50%);
      z-index: 1;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div class="auth-bg-glow"></div>
  
  <div class="auth-container">
    <a href="index.html" class="auth-logo">Vivacity.</a>
    <div class="auth-sub">Create your account to start rendering.</div>

    <div class="prompt-carryover" id="promptCarryover">
      <span class="prompt-label">Your Prompt</span>
      <span id="promptText"></span>
    </div>

    <button class="google-btn" id="googleSignInBtn">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>
  </div>

  <!-- Firebase Web SDK Integration -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    // TODO: Replace with actual Firebase config from Firebase Console
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "your-project.firebaseapp.com",
      projectId: "your-project",
      storageBucket: "your-project.appspot.com",
      messagingSenderId: "123456789",
      appId: "1:123456789:web:abcdef"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // Check for carried-over prompt from hero section
    const urlParams = new URLSearchParams(window.location.search);
    const prompt = urlParams.get('prompt');
    if (prompt) {
      document.getElementById('promptCarryover').style.display = 'block';
      document.getElementById('promptText').textContent = `"${prompt}"`;
    }

    // Handle Sign In
    document.getElementById('googleSignInBtn').addEventListener('click', () => {
      // If config is placeholder, alert user to update it
      if (firebaseConfig.apiKey === "YOUR_API_KEY") {
        alert("Firebase Auth requires a valid configuration. Please update the firebaseConfig object in signup.html with your actual Firebase project keys.");
        return;
      }

      signInWithPopup(auth, provider)
        .then((result) => {
          const user = result.user;
          console.log("Successfully logged in:", user);
          // Redirect to app dashboard
          // window.location.href = 'dashboard.html';
        }).catch((error) => {
          console.error("Auth error:", error);
          alert(error.message);
        });
    });
  </script>
</body>
</html>
